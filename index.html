<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entity-404</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        /* UI Overlay */
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        .stat {
            position: absolute;
            font-size: 20px;
            text-shadow: 2px 2px #000;
        }

        #paper-count { top: 20px; left: 20px; }
        #timer { top: 20px; right: 20px; }
        #fps { bottom: 10px; right: 10px; font-size: 12px; opacity: 0.5; }

        #credits {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 14px;
            color: rgba(255,255,255,0.3);
            pointer-events: none;
            z-index: 20;
        }

        #volume-toggle {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            z-index: 20;
            pointer-events: auto;

        /* Mobile Controls */
        #mobile-controls {
            display: none;
            position: absolute;
            top: 0;
            left: 0;

            pointer-events: none;

        #joystick-container, #look-joystick-container, #mobile-shoot {
            touch-action: none;

        }

        #joystick-container {
            position: absolute;
            bottom: 50px;
            left: 50px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);

        #joystick-stick {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;

        #look-joystick-stick {

            top: 50%;
            left: 50%;

            height: 50px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        #mobile-shoot {
            position: absolute;
            bottom: 60px;
            right: 50px;

            height: 80px;

            border-radius: 50%;

            justify-content: center;

            touch-action: none;
            user-select: none;

        #mobile-flashlight {

            bottom: 170px;
            left: 50px;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border: 2px solid #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;

        }

        #stamina-container {
            position: absolute;
            bottom: 30px;

            height: 10px;
            border: 2px solid #fff;
            background: rgba(0,0,0,0.5);
        }

        #stamina-bar {
            width: 100%;
            height: 100%;
            background: #fff;
            transition: width 0.1s;
        }

        #weapon {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 300px;
            pointer-events: none;
            z-index: 5;
            transition: transform 0.1s;
        }
        #weapon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #muzzle-flash {
            position: absolute;
            bottom: 250px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, yellow, orange, transparent);
            border-radius: 50%;
            display: none;
            z-index: 6;
        }

        #crosshair {
            position: absolute;
            top: 47%;

        }
        .crosshair-line {
            position: absolute;

        }
        .h-line { width: 20px; height: 2px; top: 9px; left: 0; }

        #msg-overlay {
            position: absolute;
            top: 40%;
            left: 50%;

        /* Screens */
        .screen {
            position: absolute;
            top: 0;

            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            text-align: center;
        }

        h1 { font-size: 60px; color: #fff; margin-bottom: 20px; text-shadow: 0 0 10px #fff; }
        .btn {
            padding: 15px 30px;

            background: transparent;
            color: #fff;
            border: 2px solid #fff;

            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn:hover { background: #fff; color: #000; }

        #jumpscare {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #jumpscare img {
            max-width: 100%;

            object-fit: contain;
        }
        #jumpscare .scare-text {
            position: absolute;
            color: red;
            font-size: 100px;

<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div id="paper-count" class="stat">Papeles: 0/10</div>
        <div id="timer" class="stat">Tiempo: 00:00</div>
        <div id="fps" class="stat">FPS: 0</div>
        <div id="volume-toggle" onclick="toggleVolume()">🔊</div>
        <div id="credits">© streaminglp</div>
        <div id="stamina-container"><div id="stamina-bar"></div></div>
        <div id="msg-overlay">Papel encontrado!</div>
        <div id="weapon">
            <img src="ak47.png" alt="AK47">
        </div>
        <div id="muzzle-flash"></div>
        <div id="crosshair">
            <div class="crosshair-line h-line"></div>
            <div class="crosshair-line v-line"></div>
        </div>
        <div id="mobile-controls">
            <div id="joystick-container">
                <div id="joystick-stick"></div>
            </div>
            <div id="mobile-flashlight" onclick="toggleFlashlightMobile()">🔦</div>
            <div id="look-joystick-container">
                <div id="look-joystick-stick"></div>

    <div id="menu-screen" class="screen">
        <h1>ENTITY-404</h1>
        <div class="instructions">
            Encuentra 10 papeles en el laberinto oscuro.<br>
            Evita a Entity-404.<br><br>
            W, A, S, D - Moverse<br>
            MOUSE - Mirar<br>
            SHIFT - Correr<br>
            SPACE - Saltar<br>
            ESC - Pausa
        </div>
        <button class="btn" onclick="startGame()">Empezar</button>
    </div>

    <div id="win-screen" class="screen" style="display:none;">

        <p id="final-time"></p>
        <button class="btn" onclick="location.reload()">Reiniciar</button>
    </div>

    <div id="lose-screen" class="screen" style="display:none;">
        <h1>GAME OVER</h1>
        <p>Entity-404 te ha atrapado</p>
        <button class="btn" onclick="location.reload()">Intentarlo de nuevo</button>
    </div>

    <div id="jumpscare">
        <img id="jumpscare-img" src="scare.jpeg" alt="SCARE">
    </div>
</div>

<script>
/** 
 * ENTITY-404 - Raycasting Game
 * Implemented in pure JS/Canvas
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');
const paperCountEl = document.getElementById('paper-count');
const timerEl = document.getElementById('timer');
const fpsEl = document.getElementById('fps');
const staminaBar = document.getElementById('stamina-bar');
const msgOverlay = document.getElementById('msg-overlay');

// Game Constants
const MAP_SIZE = 40; 
const TILE_SIZE = 64;
const FOV = Math.PI / 3;
let RES = 2; 

// Game State
let gameState = 'MENU';
let currentLevel = 1;
let map = [];
let player = {
    x: 0, y: 0,
    dir: 0,
    planeX: 0, planeY: 0.66,
    moveSpeed: 0,
    rotSpeed: 0,
    stamina: 100,
    papers: 0,
    flashlightOn: true,
    z: 0,
    vz: 0
};
let keys = {};
let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || (navigator.maxTouchPoints > 0);
let mouseX = 0;
let startTime = 0;
let lastTime = 0;
let frames = 0;
let fps = 0;
let slenderman = {
    x: 0, y: 0,
    active: false,
    speed: 0.02,
    spawnTimer: 0
};
let boomer = {
    x: 0, y: 0,
    active: false,
    speed: 0.015,
    spawnTimer: 0,
    mode: 'GHOST', // 'GHOST' or 'SCREAM'
    opacity: 1
};
let papers = [];
let bullets = [];

// Audio System (Web Audio API)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = audioCtx.createGain();
masterGain.connect(audioCtx.destination);

let isMuted = false;

// Static Noise System
let staticGain = null;
function startStaticNoise() {
    if (staticGain) return;
    
    const bufferSize = 2 * audioCtx.sampleRate;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
    }

    const whiteNoise = audioCtx.createBufferSource();
    whiteNoise.buffer = noiseBuffer;
    whiteNoise.loop = true;

    staticGain = audioCtx.createGain();
    staticGain.gain.setValueAtTime(0, audioCtx.currentTime);

    whiteNoise.connect(staticGain);
    staticGain.connect(masterGain);
    whiteNoise.start();
}

function playSound(freq, type, duration, vol = 0.1) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playStepSound() { playSound(100 + Math.random()*20, 'sine', 0.1, 0.05); }
function playWhisperSound() { playSound(200 + Math.random()*100, 'sawtooth', 0.5, 0.02); }
function playScreamSound() { 
    for(let i=0; i<5; i++) playSound(100 + Math.random()*400, 'sawtooth', 1, 0.2);
}

function playGunshotSound() {
    const noise = audioCtx.createBufferSource();
    const bufferSize = audioCtx.sampleRate * 0.1;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
    
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    noise.start();
}

// Accordion-like suspense sound
function playAccordionNote(freq, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 1.02, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

let ambientAudio = null;
let menuOsc = null;
let menuGain = null;

function startMenuMusic() {
    if (menuOsc) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'square'; // Retro 8-bit sound
    osc.frequency.setValueAtTime(60, audioCtx.currentTime);
    
    gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
    
    osc.connect(gain);
    gain.connect(masterGain);
    
    osc.start();
    menuOsc = osc;
    menuGain = gain;
    
    // Retro creepy pitch modulation
    setInterval(() => {
        if (menuOsc) {
            menuOsc.frequency.exponentialRampToValueAtTime(50 + Math.random() * 20, audioCtx.currentTime + 1);
        }
    }, 1000);
}

function stopMenuMusic() {
    if (menuOsc) {
        menuOsc.stop();
        menuOsc = null;
        menuGain = null;
    }
}

function startAmbientMusic() {
    if (ambientAudio) return;
    ambientAudio = new Audio(AMBIENT_AUDIO_URL);
    ambientAudio.loop = true;
    ambientAudio.volume = 0.5;
    ambientAudio.play().catch(e => console.log("Audio playback failed until user interaction", e));
}
function stopAmbientMusic() {
    if (ambientAudio) {
        ambientAudio.pause();
        ambientAudio = null;
    }
}

const VILLAIN_IMAGE_URL = 'villain.jpg.jpeg'; // Actualizado según el nombre real del archivo
const AMBIENT_AUDIO_URL = 'backroom house  7 weeks and 3 days.mp3';
const BOOMER_AUDIO_URL = 'Boomer Sonido.mp3';
const SCREAM_AUDIO_URL = 'GRITO SCREAM.mp3';
const screamAudio = new Audio(SCREAM_AUDIO_URL);

const CREEPY_MESSAGES = [
    "EL ACORDEÓN SUENA...", "PUEDO OÍR LA MÚSICA", "Viene por ti", 
    "Siente el ritmo del miedo", "EL ACORDEONISTA TE VE", "NO DEJES DE CORRER", "Sigue la melodía", 
    "LA MÚSICA NO PARA", "Siente sus notas", "ÉL ESTÁ DETRÁS DE TI"
];

// Maze Generation (Recursive Backtracking)
function generateMaze() {
    map = Array(MAP_SIZE).fill().map(() => Array(MAP_SIZE).fill(1));
    const stack = [];
    const start = { x: 1, y: 1 };
    map[start.y][start.x] = 0;
    stack.push(start);

    while (stack.length > 0) {
        const current = stack[stack.length - 1];
        const neighbors = [];
        const dirs = [[0, 2], [0, -2], [2, 0], [-2, 0]];

        dirs.forEach(([dx, dy]) => {
            const nx = current.x + dx;
            const ny = current.y + dy;
            if (nx > 0 && nx < MAP_SIZE - 1 && ny > 0 && ny < MAP_SIZE - 1 && map[ny][nx] === 1) {
                neighbors.push({ x: nx, y: ny, dx, dy });
            }
        });

        if (neighbors.length > 0) {
            const next = neighbors[Math.floor(Math.random() * neighbors.length)];
            map[next.y][next.x] = 0;
            map[current.y + next.dy/2][current.x + next.dx/2] = 0;
            stack.push(next);
        } else {
            stack.pop();
        }
    }

    // Difficulty scaling: remove more walls in early levels to make it easier
    const easeFactor = Math.max(0, (11 - currentLevel) * 20); 
    for (let i = 0; i < easeFactor; i++) {
        let rx = Math.floor(Math.random() * (MAP_SIZE - 2)) + 1;
        let ry = Math.floor(Math.random() * (MAP_SIZE - 2)) + 1;
        map[ry][rx] = 0;
    }
}

function placePapers() {
    papers = [];
    const messages = [...CREEPY_MESSAGES].sort(() => Math.random() - 0.5);
    
    while (papers.length < 10) {
        let rx = Math.floor(Math.random() * MAP_SIZE);
        let ry = Math.floor(Math.random() * MAP_SIZE);
        
        if (map[ry][rx] === 0 && (rx !== 1 || ry !== 1)) {
            // Check if it's adjacent to a wall to "stick" it
            const neighbors = [[0,1], [0,-1], [1,0], [-1,0]];
            let wallDir = null;
            for (let [dx, dy] of neighbors) {
                if (map[ry + dy] && map[ry + dy][rx + dx] === 1) {
                    wallDir = [dx, dy];
                    break;
                }
            }

            if (wallDir) {
                papers.push({ 
                    x: rx + 0.5 + wallDir[0] * 0.3, 
                    y: ry + 0.5 + wallDir[1] * 0.3, 
                    message: messages[papers.length],
                    collected: false 
                });
            }
        }
    }
}

// Game Logic
function startGame() {
    stopMenuMusic();
    startStaticNoise(); // Initialize static noise system
    currentLevel = 1;
    initLevel();
    
    document.getElementById('menu-screen').style.display = 'none';
    ui.style.display = 'block';
    gameState = 'PLAY';
    startTime = Date.now();
    startAmbientMusic();
    
    // Dynamic resolution for mobile to prevent freezing
    RES = isMobile ? 4 : 2;
    
    if (isMobile) {
        document.getElementById('mobile-controls').style.display = 'block';
    }
    
    canvas.width = window.innerWidth / RES;
    canvas.height = window.innerHeight / RES;
    
    if (!isMobile) {
        canvas.requestPointerLock();
    }
    requestAnimationFrame(gameLoop);
}

function initLevel() {
    generateMaze();
    placePapers();
    player.x = 1.5;
    player.y = 1.5;
    player.dir = 0;
    player.papers = 0;
    player.flashlightOn = true;
    slenderman.active = false;
    slenderman.spawnTimer = 0;
    slenderman.speed = 0.02 + (currentLevel * 0.005);
    showMsg(`NIVEL ${currentLevel}`);
}

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousedown', e => {
    if (gameState === 'PLAY') {
        canvas.requestPointerLock();
    }

    if (e.button === 0 && gameState === 'PLAY') {
        playGunshotSound();
        
        // Fire Bullet
        bullets.push({
            x: player.x,
            y: player.y,
            dir: player.dir,
            dist: 0,
            maxDist: 20
        });

        const weapon = document.getElementById('weapon');
        const flash = document.getElementById('muzzle-flash');
        
        weapon.style.transform = 'translateX(-50%) translateY(20px) rotate(5deg)';
        flash.style.display = 'block';
        
        setTimeout(() => {
            weapon.style.transform = 'translateX(-50%)';
            flash.style.display = 'none';
        }, 50);
    }
});

window.addEventListener('mousemove', e => {
    if (document.pointerLockElement === canvas) {
        const sensitivity = 0.002;
        player.dir += e.movementX * sensitivity;
        // Normalizar dirección para evitar errores de precisión
        player.dir = (player.dir + Math.PI) % (2 * Math.PI) - Math.PI;
    }
});

// Mobile Touch Controls Implementation
if (isMobile) {
    const joystick = document.getElementById('joystick-container');
    const stick = document.getElementById('joystick-stick');
    const shootBtn = document.getElementById('mobile-shoot');
    let stickActive = false;
    let stickStart = { x: 0, y: 0 };

    joystick.addEventListener('touchstart', e => {
        stickActive = true;
        const touch = e.touches[0];
        const rect = joystick.getBoundingClientRect();
        stickStart = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
    }, { passive: false });

    window.addEventListener('touchmove', e => {
        if (!stickActive) return;
        const touch = e.touches[0];
        const dx = touch.clientX - stickStart.x;
        const dy = touch.clientY - stickStart.y;
        const distance = Math.min(Math.hypot(dx, dy), 60);
        const angle = Math.atan2(dy, dx);
        
        const moveX = Math.cos(angle) * distance;
        const moveY = Math.sin(angle) * distance;
        
        stick.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
        
        // Map joystick to keys
        keys['KeyW'] = dy < -20;
        keys['KeyS'] = dy > 20;
        keys['KeyA'] = dx < -20;
        keys['KeyD'] = dx > 20;
    }, { passive: false });

    window.addEventListener('touchend', () => {
        stickActive = false;
        stick.style.transform = 'translate(-50%, -50%)';
        keys['KeyW'] = keys['KeyS'] = keys['KeyA'] = keys['KeyD'] = false;
    });

    // Look Joystick Logic
    const lookJoystick = document.getElementById('look-joystick-container');
    const lookStick = document.getElementById('look-joystick-stick');
    let lookActive = false;
    let lookStart = { x: 0, y: 0 };

    lookJoystick.addEventListener('touchstart', e => {
        lookActive = true;
        const touch = e.touches[0];
        const rect = lookJoystick.getBoundingClientRect();
        lookStart = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
    }, { passive: false });

    window.addEventListener('touchmove', e => {
        if (!lookActive) return;
        
        // Find the touch that started on the look joystick
        let touch = null;
        for (let t of e.touches) {
            // We identify the look touch by its proximity to the look joystick 
            // since touchmove doesn't tell us which element was touched initially
            const rect = lookJoystick.getBoundingClientRect();
            if (t.clientX > rect.left && t.clientX < rect.right && t.clientY > rect.top && t.clientY < rect.bottom) {
                touch = t;
            }
        }
        
        // Fallback: if we can't find it precisely, use the first touch if only one is present
        if (!touch && e.touches.length === 1) touch = e.touches[0];
        if (!touch) return;

        const dx = touch.clientX - lookStart.x;
        const dy = touch.clientY - lookStart.y;
        const distance = Math.min(Math.hypot(dx, dy), 60);
        const angle = Math.atan2(dy, dx);
        
        const moveX = Math.cos(angle) * distance;
        const moveY = Math.sin(angle) * distance;
        
        lookStick.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
        
        // Rotate camera based on horizontal movement
        const rotationSensitivity = 0.002;
        player.dir += dx * rotationSensitivity;
    }, { passive: false });

    window.addEventListener('touchend', e => {
        // We need to check if any touches are left to decide if we stop lookActive
        // This is a bit tricky with multi-touch
        if (e.touches.length === 0) {
            lookActive = false;
            lookStick.style.transform = 'translate(-50%, -50%)';
        }
    });

    shootBtn.addEventListener('touchstart', e => {
        e.preventDefault();
        // Trigger the same shoot logic as mousedown
        const shootEvent = new MouseEvent('mousedown', {
            bubbles: true,
            cancelable: true,
            button: 0
        });
        document.dispatchEvent(shootEvent);
    });
}

function update(dt) {
    if (gameState !== 'PLAY') return;

    // Flashlight Logic
    if (player.flashlightOn && Math.random() < 0.001) {
        player.flashlightOn = false;
        playSound(100, 'sawtooth', 0.1, 0.02);
    }
    if (keys['KeyE'] && !player.flashlightOn) {
        player.flashlightOn = true;
        playSound(600, 'sine', 0.05, 0.05);
    }

    // Jump Logic
    if (keys['Space'] && player.z === 0) {
        player.vz = 0.2; 
    }
    player.z += player.vz;
    if (player.z > 0) {
        player.vz -= 0.015; // Gravity
    } else {
        player.z = 0;
        player.vz = 0;
    }

    // Movement
    let moveSpeed = 0.05;
    if (keys['ShiftLeft'] && player.stamina > 0) {
        moveSpeed = 0.1;
        player.stamina -= 0.5;
    } else {
        if (player.stamina < 100) player.stamina += 0.2;
    }

    const dx = Math.cos(player.dir) * moveSpeed;
    const dy = Math.sin(player.dir) * moveSpeed;

    if (keys['KeyW']) {
        if (map[Math.floor(player.y)][Math.floor(player.x + dx)] === 0) player.x += dx;
        if (map[Math.floor(player.y + dy)][Math.floor(player.x)] === 0) player.y += dy;
        if (Math.random() < 0.05) playStepSound();
    }
    if (keys['KeyS']) {
        if (map[Math.floor(player.y)][Math.floor(player.x - dx)] === 0) player.x -= dx;
        if (map[Math.floor(player.y - dy)][Math.floor(player.x)] === 0) player.y -= dy;
        if (Math.random() < 0.05) playStepSound();
    }
    if (keys['KeyA']) {
        const adx = Math.cos(player.dir - Math.PI/2) * moveSpeed;
        const ady = Math.sin(player.dir - Math.PI/2) * moveSpeed;
        if (map[Math.floor(player.y)][Math.floor(player.x + adx)] === 0) player.x += adx;
        if (map[Math.floor(player.y + ady)][Math.floor(player.x)] === 0) player.y += ady;
    }
    if (keys['KeyD']) {
        const ddx = Math.cos(player.dir + Math.PI/2) * moveSpeed;
        const ddy = Math.sin(player.dir + Math.PI/2) * moveSpeed;
        if (map[Math.floor(player.y)][Math.floor(player.x + ddx)] === 0) player.x += ddx;
        if (map[Math.floor(player.y + ddy)][Math.floor(player.x)] === 0) player.y += ddy;
    }

    // Paper Collection
    papers.forEach(p => {
        if (!p.collected) {
            const dist = Math.hypot(p.x - player.x, p.y - player.y);
            if (dist < 0.4) {
                p.collected = true;
                player.papers++;
                showMsg(`${p.message}\nPapel encontrado ${player.papers}/10`);
                playSound(400, 'sine', 0.2);
            }
        }
    });

    if (player.papers >= 10) {
        if (currentLevel < 10) {
            currentLevel++;
            initLevel();
        } else {
            gameState = 'WIN';
            stopAmbientMusic();
            document.getElementById('win-screen').style.display = 'flex';
            document.getElementById('final-time').innerText = `Tiempo: ${timerEl.innerText}`;
            document.exitPointerLock();
            document.getElementById('mobile-controls').style.display = 'none';
        }
    }

    // Slenderman Logic
    updateSlenderman(dt);

    // Boomer Logic
    updateBoomer(dt);

    // Bullet Logic
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.dist += 0.5; // Bullet speed
        
        const bx = b.x + Math.cos(b.dir) * b.dist;
        const by = b.y + Math.sin(b.dir) * b.dist;
        
        if (b.dist > b.maxDist || (map[Math.floor(by)] && map[Math.floor(by)][Math.floor(bx)] === 1)) {
            bullets.splice(i, 1);
        }
    }

    // UI Updates
    paperCountEl.innerText = `Nivel ${currentLevel} - Papeles: ${player.papers}/10`;
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const secs = String(elapsed % 60).padStart(2, '0');
    timerEl.innerText = `Tiempo: ${mins}:${secs}`;
    staminaBar.style.width = `${player.stamina}%`;
}

// Load Entities Images
const villainImg = new Image();
villainImg.src = VILLAIN_IMAGE_URL;

const boomerImg = new Image();
boomerImg.src = 'boomer.png';


function toggleFlashlightMobile() {
    player.flashlightOn = !player.flashlightOn;
    if (player.flashlightOn) {
        playSound(600, 'sine', 0.05, 0.05);
    } else {
        playSound(100, 'sawtooth', 0.1, 0.02);
    }
}

function toggleVolume() {
    isMuted = !isMuted;
    masterGain.gain.setValueAtTime(isMuted ? 0 : 1, audioCtx.currentTime);
    document.getElementById('volume-toggle').innerText = isMuted ? '🔇' : '🔊';
}

function updateSlenderman(dt) {
    // Spawn Logic
    if (!slenderman.active) {
        slenderman.spawnTimer += dt;
        const spawnThreshold = player.papers >= 8 ? 5 : 15;
        if (slenderman.spawnTimer > spawnThreshold) {
            spawnSlenderman();
        }
    } else {
        const dx = player.x - slenderman.x;
        const dy = player.y - slenderman.y;
        const dist = Math.hypot(dx, dy);
        const currentSpeed = slenderman.speed + (player.papers * 0.005);
        slenderman.x += (dx / dist) * currentSpeed;
        slenderman.y += (dy / dist) * currentSpeed;

        if (dist < 0.3) {
            triggerGameOver();
        }

        // Dynamic audio interference based on distance
        if (startStaticNoise) {
            const interference = Math.max(0, 1 - dist / 10);
            if (staticGain) {
                staticGain.gain.setValueAtTime(interference * 0.3, audioCtx.currentTime);
            }
            // Lower master volume slightly when he is very close
            if (dist < 3) {
                masterGain.gain.setTargetAtTime(0.6, audioCtx.currentTime, 0.1);
            } else {
                masterGain.gain.setTargetAtTime(isMuted ? 0 : 1, audioCtx.currentTime, 0.1);
            }
        }

        if (dist < 5 && Math.random() < 0.02) {
            playAccordionNote(220 + Math.random()*110, 0.3);
        }
    }
}

function updateBoomer(dt) {
    if (!boomer.active) {
        boomer.spawnTimer += dt;
        if (boomer.spawnTimer > 20) {
            spawnBoomer();
        }
    } else {
        const dx = player.x - boomer.x;
        const dy = player.y - boomer.y;
        const dist = Math.hypot(dx, dy);
        
        // Move Boomer (ghost mode: ignores walls)
        boomer.x += (dx / dist) * boomer.speed;
        boomer.y += (dy / dist) * boomer.speed;

        // Mode change: SCREAM if close
        if (dist < 3) {
            boomer.mode = 'SCREAM';
            if (Math.random() < 0.05) playScreamSound();
        } else {
            boomer.mode = 'GHOST';
        }

        if (dist < 0.4) {
            triggerGameOver();
        }

        // Fade out when too far
        if (dist > 15) {
            boomer.opacity -= dt * 0.2;
            if (boomer.opacity <= 0) {
                boomer.active = false;
                boomer.spawnTimer = 0;
                boomer.opacity = 1;
            }
        } else {
            boomer.opacity = Math.min(1, boomer.opacity + dt * 0.2);
        }
    }
}

function spawnBoomer() {
    let sx, sy;
    do {
        sx = Math.floor(Math.random() * MAP_SIZE);
        sy = Math.floor(Math.random() * MAP_SIZE);
    } while (Math.hypot(sx - player.x, sy - player.y) < 10);
    
    boomer.x = sx + 0.5;
    boomer.y = sy + 0.5;
    boomer.active = true;
    boomer.spawnTimer = 0;
    boomer.opacity = 1;
}

function spawnSlenderman() {
    // Spawn far from player but inside maze
    let sx, sy;
    do {
        sx = Math.floor(Math.random() * MAP_SIZE);
        sy = Math.floor(Math.random() * MAP_SIZE);
    } while (map[sy][sx] === 1 || Math.hypot(sx - player.x, sy - player.y) < 8);
    
    slenderman.x = sx + 0.5;
    slenderman.y = sy + 0.5;
    slenderman.active = true;
    slenderman.spawnTimer = 0;
}

function triggerGameOver() {
    gameState = 'LOSE';
    document.getElementById('jumpscare').style.display = 'flex';
    playScreamSound();
    if (staticGain) {
        staticGain.gain.setValueAtTime(0, audioCtx.currentTime);
    }
    if (screamAudio) {
        screamAudio.currentTime = 0;
        screamAudio.play().catch(e => console.log("Scream audio failed", e));
    }
    setTimeout(() => {
        document.getElementById('jumpscare').style.display = 'none';
        document.getElementById('lose-screen').style.display = 'flex';
        document.exitPointerLock();
        document.getElementById('mobile-controls').style.display = 'none';
    }, 2000);
}

function showMsg(text) {
    msgOverlay.innerText = text;
    msgOverlay.style.opacity = 1;
    setTimeout(() => msgOverlay.style.opacity = 0, 2000);
}

function render() {
    if (gameState !== 'PLAY') return;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Ceiling and Floor
    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, canvas.width, canvas.height / 2);
    ctx.fillStyle = '#111';
    ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);

    // Raycasting
    for (let x = 0; x < canvas.width; x++) {
        const cameraX = 2 * x / canvas.width - 1;
        const rayDirX = Math.cos(player.dir) + Math.cos(player.dir + Math.PI/2) * cameraX * 0.66;
        const rayDirY = Math.sin(player.dir) + Math.sin(player.dir + Math.PI/2) * cameraX * 0.66;

        let mapX = Math.floor(player.x);
        let mapY = Math.floor(player.y);

        const deltaDistX = Math.abs(1 / rayDirX);
        const deltaDistY = Math.abs(1 / rayDirY);

        let stepX, stepY, sideDistX, sideDistY;

        if (rayDirX < 0) {
            stepX = -1;
            sideDistX = (player.x - mapX) * deltaDistX;
        } else {
            stepX = 1;
            sideDistX = (mapX + 1.0 - player.x) * deltaDistX;
        }
        if (rayDirY < 0) {
            stepY = -1;
            sideDistY = (player.y - mapY) * deltaDistY;
        } else {
            stepY = 1;
            sideDistY = (mapY + 1.0 - player.y) * deltaDistY;
        }

        let hit = 0;
        let side = 0;
        let iterations = 0;
        while (hit === 0 && iterations < 1000) {
            iterations++;
            if (sideDistX < sideDistY) {
                sideDistX += deltaDistX;
                mapX += stepX;
                side = 0;
            } else {
                sideDistY += deltaDistY;
                mapY += stepY;
                side = 1;
            }
            if (map[mapY] && map[mapY][mapX] === 1) hit = 1;
        }

        let perpWallDist = (side === 0) ? (sideDistX - deltaDistX) : (sideDistY - deltaDistY);
        
        const flicker = Math.random() > 0.98 ? 0.5 : 1.0;
        const lightFactor = player.flashlightOn ? 1.0 : 0.05;
        const fog = Math.max(0, 1 - perpWallDist / 12);
        const color = side === 1 ? 40 : 60;
        const brightness = Math.floor(color * fog * flicker * lightFactor);
        
        ctx.fillStyle = `rgb(${brightness},${brightness},${brightness})`;
        const lineHeight = Math.floor(canvas.height / perpWallDist);
        
        // Offset horizon based on jump height (player.z)
        // To make the map go DOWN (player goes UP), we ADD a positive offset to the top position
        const horizonOffset = player.z * canvas.height;
        ctx.fillRect(x, (canvas.height - lineHeight) / 2 + horizonOffset, 1, lineHeight);
    }

    // Gun Bobbing Effect on Jump
    const weapon = document.getElementById('weapon');
    if (weapon) {
        weapon.style.bottom = `${player.z * 500}px`;
    }

    // Paper Rendering (Billboards)
    papers.forEach(p => {
        if (!p.collected) {
            const dx = p.x - player.x;
            const dy = p.y - player.y;
            const dist = Math.hypot(dx, dy);
            
            let angle = Math.atan2(dy, dx) - player.dir;
            while (angle < -Math.PI) angle += 2 * Math.PI;
            while (angle > Math.PI) angle -= 2 * Math.PI;

            if (Math.abs(angle) < FOV) {
                const screenX = (0.5 * (angle / (FOV / 2)) + 0.5) * canvas.width;
                const size = canvas.height / dist;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, 1 - dist/10)})`;
                ctx.fillRect(screenX - size/20, (canvas.height - size/10)/2, size/10, size/10);
            }
        }
    });

    // Slenderman Rendering (Simplified Billboard)
    if (slenderman.active) {
        const dx = slenderman.x - player.x;
        const dy = slenderman.y - player.y;
        const dist = Math.hypot(dx, dy);
        
        let angle = Math.atan2(dy, dx) - player.dir;
        while (angle < -Math.PI) angle += 2 * Math.PI;
        while (angle > Math.PI) angle -= 2 * Math.PI;

        if (Math.abs(angle) < FOV) {
            const screenX = (0.5 * (angle / (FOV / 2)) + 0.5) * canvas.width;
            const size = canvas.height / dist;
            
            const glitchX = Math.random() < 0.05 ? (Math.random() - 0.5) * 10 : 0;
            const glitchS = Math.random() < 0.05 ? size * 1.1 : size;

            // Draw the image of the villain
            ctx.drawImage(
                villainImg, 
                screenX + glitchX - glitchS/4, 
                (canvas.height - glitchS)/2 - (player.z * canvas.height), 
                glitchS/2, 
                glitchS
            );
        }
    }

    // Boomer Rendering
    if (boomer.active) {
        const dx = boomer.x - player.x;
        const dy = boomer.y - player.y;
        const dist = Math.hypot(dx, dy);
        
        let angle = Math.atan2(dy, dx) - player.dir;
        while (angle < -Math.PI) angle += 2 * Math.PI;
        while (angle > Math.PI) angle -= 2 * Math.PI;

        if (Math.abs(angle) < FOV) {
            const screenX = (0.5 * (angle / (FOV / 2)) + 0.5) * canvas.width;
            const size = canvas.height / dist;
            
            ctx.globalAlpha = boomer.opacity;
            ctx.drawImage(
                boomerImg, 
                screenX - size/3, 
                (canvas.height - size)/2 - (player.z * canvas.height), 
                size/1.5, 
                size
            );
            ctx.globalAlpha = 1.0;
        }
    }
}

function gameLoop(time) {
    if (!lastTime) lastTime = time;
    const dt = (time - lastTime) / 1000;
    lastTime = time;
    
    // Cap dt to prevent teleporting/physics explosion on lag
    const cappedDt = Math.min(dt, 0.1);

    frames++;
    if (time % 1000 < 20) fps = frames;
    frames = 0;
    fpsEl.innerText = `FPS: ${Math.round(fps)}`;

    update(cappedDt);
    render();
    if (gameState === 'PLAY') requestAnimationFrame(gameLoop);
}

// Pause mechanism
window.addEventListener('keydown', e => {
    if (e.code === 'Escape') {
        if (gameState === 'PLAY') {
            gameState = 'PAUSED';
            document.exitPointerLock();
            document.getElementById('menu-screen').style.display = 'flex';
            document.getElementById('menu-screen').querySelector('h1').innerText = 'PAUSA';
            document.getElementById('mobile-controls').style.display = 'none';
        }
    }
});

// Resume from pause
function resumeGame() {
    if (gameState === 'PAUSED') {
        gameState = 'PLAY';
        document.getElementById('menu-screen').style.display = 'none';
        if (isMobile) {
            document.getElementById('mobile-controls').style.display = 'block';
        }
        canvas.requestPointerLock();
        requestAnimationFrame(gameLoop);
    }
}

// Modify the start button to handle resume
document.querySelector('.btn').onclick = function() {
    if (gameState === 'PAUSED') resumeGame();
    else startGame();
};

// Start menu music on first interaction (Browser Policy)
window.addEventListener('click', () => {
    if (gameState === 'MENU') {
        startMenuMusic();
    }
}, { once: true });

window.addEventListener('load', () => {
    startMenuMusic();
});
